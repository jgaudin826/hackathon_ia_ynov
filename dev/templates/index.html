<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechCorp — Assistant Financier</title>
    <style>
      :root {
        --ink: #10151c;
        --panel: #161d27;
        --panel-2: #1d2530;
        --line: #2a3441;
        --paper: #f4f1ea;
        --gold: #c9a24b;
        --gold-dim: #8a7239;
        --green: #4caf7d;
        --red: #d4685a;
        --text: #e8e4da;
        --text-dim: #8d96a3;
        --serif: "Iowan Old Style", "Georgia", "Times New Roman", serif;
        --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--ink);
        color: var(--text);
        font-family: var(--mono);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        border-bottom: 1px solid var(--line);
        padding: 18px 28px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        background: linear-gradient(180deg, #131922, var(--ink));
      }

      header h1 {
        font-family: var(--serif);
        font-size: 1.3rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin: 0;
        color: var(--paper);
      }

      header .ticker {
        font-size: 0.7rem;
        color: var(--gold-dim);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-top: 2px;
      }

      #status {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-dim);
        transition: background 0.3s;
      }

      #status.connected .dot {
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
      }
      #status.disconnected .dot {
        background: var(--red);
        box-shadow: 0 0 8px var(--red);
      }
      #status.connected .label {
        color: var(--green);
      }
      #status.disconnected .label {
        color: var(--red);
      }

      main {
        flex: 1;
        overflow-y: auto;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        max-width: 760px;
        width: 100%;
        margin: 0 auto;
      }

      .empty-state {
        margin: auto;
        text-align: center;
        color: var(--text-dim);
        max-width: 420px;
      }

      .empty-state .mark {
        font-family: var(--serif);
        font-size: 2rem;
        color: var(--gold);
        margin-bottom: 8px;
      }

      .empty-state p {
        font-size: 0.85rem;
        line-height: 1.6;
      }

      .msg {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-width: 86%;
        animation: rise 0.25s ease;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg.user {
        align-self: flex-end;
        align-items: flex-end;
      }
      .msg.assistant {
        align-self: flex-start;
        align-items: flex-start;
      }

      .msg .tag {
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .msg.user .tag {
        color: var(--gold-dim);
      }

      .bubble {
        padding: 12px 16px;
        border-radius: 3px;
        line-height: 1.55;
        font-size: 0.9rem;
        white-space: pre-wrap;
      }

      .msg.user .bubble {
        background: var(--panel-2);
        border: 1px solid var(--line);
        color: var(--paper);
      }

      .msg.assistant .bubble {
        background: transparent;
        border-left: 2px solid var(--gold-dim);
        padding-left: 14px;
        color: var(--text);
      }

      .msg.error .bubble {
        border-left-color: var(--red);
        color: var(--red);
      }

      .thinking {
        align-self: flex-start;
        color: var(--text-dim);
        font-size: 0.8rem;
        padding-left: 16px;
        border-left: 2px solid var(--line);
      }

      .thinking::after {
        content: "";
        display: inline-block;
        width: 4px;
        height: 4px;
        background: var(--gold);
        border-radius: 50%;
        margin-left: 6px;
        animation: blink 1s infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0.2;
        }
      }

      footer {
        border-top: 1px solid var(--line);
        padding: 18px 28px 24px;
        background: var(--ink);
      }

      form {
        max-width: 760px;
        margin: 0 auto;
        display: flex;
        gap: 10px;
      }

      textarea {
        flex: 1;
        resize: none;
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.9rem;
        padding: 12px 14px;
        border-radius: 3px;
        outline: none;
        height: 46px;
        line-height: 1.4;
      }

      textarea:focus {
        border-color: var(--gold-dim);
      }

      button {
        background: var(--gold);
        color: var(--ink);
        border: none;
        padding: 0 22px;
        font-family: var(--mono);
        font-weight: 600;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover:not(:disabled) {
        background: #ddb45f;
      }
      button:disabled {
        background: var(--panel-2);
        color: var(--text-dim);
        cursor: not-allowed;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--panel-2);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>TechCorp — Assistant Financier</h1>
        <div class="ticker">Phi-3.5 · Finance &amp; Investissement</div>
      </div>
      <div id="status" class="disconnected">
        <span class="dot"></span>
        <span class="label">Vérification…</span>
      </div>
    </header>

    <main id="chat">
      <div class="empty-state" id="emptyState">
        <div class="mark">§</div>
        <p>
          Posez une question sur l'investissement, le budget, les marchés ou la
          finance d'entreprise.
        </p>
      </div>
    </main>

    <footer>
      <form id="chatForm">
        <textarea
          id="input"
          placeholder="Écrivez votre message…"
          rows="1"
        ></textarea>
        <button type="submit" id="sendBtn">Envoyer</button>
      </form>
    </footer>

    <script>
      const chat = document.getElementById("chat");
      const form = document.getElementById("chatForm");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      const emptyState = document.getElementById("emptyState");

      let history = [];

      function setStatus(connected) {
        statusEl.className = connected ? "connected" : "disconnected";
        statusEl.querySelector(".label").textContent = connected
          ? "Connecté"
          : "Déconnecté";
      }

      async function checkStatus() {
        try {
          const res = await fetch("/api/status");
          const data = await res.json();
          setStatus(!!data.connected);
        } catch (e) {
          setStatus(false);
        }
      }

      function addMessage(role, content, isError = false) {
        emptyState.remove();
        const div = document.createElement("div");
        div.className = `msg ${role}${isError ? " error" : ""}`;
        div.innerHTML = `
    <span class="tag">${role === "user" ? "Vous" : "Assistant"}</span>
    <div class="bubble"></div>
  `;
        div.querySelector(".bubble").textContent = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
      }

      function addThinking() {
        const div = document.createElement("div");
        div.className = "thinking";
        div.id = "thinkingIndicator";
        div.textContent = "Réflexion en cours";
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function removeThinking() {
        document.getElementById("thinkingIndicator")?.remove();
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addMessage("user", text);
        history.push({ role: "user", content: text });
        input.value = "";
        input.style.height = "46px";
        sendBtn.disabled = true;
        addThinking();

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history }),
          });
          const data = await res.json();
          removeThinking();

          if (!res.ok || data.error) {
            addMessage("assistant", data.error || "Erreur inconnue.", true);
            setStatus(false);
          } else {
            addMessage("assistant", data.content);
            history.push({ role: "assistant", content: data.content });
            setStatus(true);
          }
        } catch (err) {
          removeThinking();
          addMessage("assistant", "Connexion au serveur impossible.", true);
          setStatus(false);
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.requestSubmit();
        }
      });

      input.addEventListener("input", () => {
        input.style.height = "46px";
        input.style.height = Math.min(input.scrollHeight, 140) + "px";
      });

      checkStatus();
      setInterval(checkStatus, 8000);
    </script>
  </body>
</html>
